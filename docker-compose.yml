# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  redis:
    image: redis:7
    container_name: exam_redis
    restart: always
  api:
    build: .
    restart: always
    container_name: exam_api
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - .:/app
      - reports_data:/app/reports
  worker:
    build: .
    container_name: exam_worker
    restart: always
    command: celery -A app.core.celery_app.celery worker --loglevel=info
    env_file:
      - .env.prod
    depends_on:
      - redis
    volumes:
      - .:/app
      - reports_data:/app/reports
  frontend:
    build: ./frontend
    container_name: exam_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    env_file:
      - .env.prod
volumes:
  postgres_data:
  reports_data:  
  frontend_node_modules:

